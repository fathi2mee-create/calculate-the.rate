<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة المعدل الجامعي - École Polytechnique</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f0f4f8;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 800px;
            width: 100%;
            margin-bottom: 100px; 
        }
        h2 {
            color: #007BFF;
            text-align: center;
            font-size: 1.4rem;
            margin-top: 10px;
            margin-bottom: 25px;
            line-height: 1.4;
        }
        .subject-card {
            background: #ffffff;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border-left: 5px solid #007BFF;
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }
        .subject-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .subject-title {
            margin: 0;
            font-size: 16px;
            text-transform: capitalize;
            color: #333;
            font-weight: 600;
        }
        .coef-badge {
            background-color: #e1f0ff;
            color: #007BFF;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }
        .inputs-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .inputs-container.three-inputs {
            grid-template-columns: 1fr 1fr 1fr;
        }
        input[type="number"] {
            width: 100%;
            height: 40px;
            padding: 8px;
            border: 1px solid #cdd7e2;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
            text-align: center;
        }
        input[type="number"]:focus {
            border-color: #007BFF;
            box-shadow: 0 0 0 3px rgba(0,123,255,0.1);
        }
        #result-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #ffffff;
            padding: 15px;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            z-index: 1000;
        }
        button {
            height: 45px;
            padding: 0 25px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #0056b3;
        }
        #result {
            height: 45px;
            width: 130px;
            padding: 5px;
            font-size: 18px;
            font-weight: bold;
            color: #28a745;
            text-align: center;
            border: 2px solid #28a745;
            border-radius: 6px;
            background-color: #f4fff7;
            outline: none;
        }

        @media (min-width: 600px) {
            h2 {
                font-size: 1.8rem;
            }
            .subject-card {
                grid-template-columns: 200px 1fr;
                align-items: center;
                gap: 20px;
            }
            .subject-info {
                flex-direction: column;
                align-items: flex-start;
                gap: 5px;
            }
            .inputs-container {
                margin-left: auto;
                width: 100%;
                max-width: 500px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>La moyenne du S2 - 1ère année<br><span style="color: #555; font-size: 1.1rem;">École Nationale Polytechnique</span></h2>

        <div class="subject-card">
            <div class="subject-info">
                <h3 class="subject-title">analysis</h3>
                <span class="coef-badge">Coef: 5</span>
            </div>
            <div class="inputs-container">
                <input type="number" id="anaintero" placeholder="Interro (40%)" min="0" max="20" step="0.25">
                <input type="number" id="anaexam" placeholder="Exam (60%)" min="0" max="20" step="0.25">
            </div>
        </div>

        <div class="subject-card">
            <div class="subject-info">
                <h3 class="subject-title">physique</h3>
                <span class="coef-badge">Coef: 5</span>
            </div>
            <div class="inputs-container three-inputs">
                <input type="number" id="physintero" placeholder="Interro (20%)" min="0" max="20" step="0.25">
                <input type="number" id="phystp" placeholder="TP (20%)" min="0" max="20" step="0.25">
                <input type="number" id="physexam" placeholder="Exam (60%)" min="0" max="20" step="0.25">
            </div>
        </div>

        <div class="subject-card">
            <div class="subject-info">
                <h3 class="subject-title">chimie</h3>
                <span class="coef-badge">Coef: 5</span>
            </div>
            <div class="inputs-container three-inputs">
                <input type="number" id="chimintero" placeholder="Interro (20%)" min="0" max="20" step="0.25">
                <input type="number" id="chimtp" placeholder="TP (20%)" min="0" max="20" step="0.25">
                <input type="number" id="chimexam" placeholder="Exam (60%)" min="0" max="20" step="0.25">
            </div>
        </div>

        <div class="subject-card">
            <div class="subject-info">
                <h3 class="subject-title">algebraic</h3>
                <span class="coef-badge">Coef: 4</span>
            </div>
            <div class="inputs-container">
                <input type="number" id="algintero" placeholder="Interro (40%)" min="0" max="20" step="0.25">
                <input type="number" id="algexam" placeholder="Exam (60%)" min="0" max="20" step="0.25">
            </div>
        </div>

        <div class="subject-card">
            <div class="subject-info">
                <h3 class="subject-title">informatique</h3>
                <span class="coef-badge">Coef: 3</span>
            </div>
            <div class="inputs-container three-inputs">
                <input type="number" id="infintero" placeholder="Interro (20%)" min="0" max="20" step="0.25">
                <input type="number" id="inftp" placeholder="TP (20%)" min="0" max="20" step="0.25">
                <input type="number" id="infexam" placeholder="Exam (60%)" min="0" max="20" step="0.25">
            </div>
        </div>

        <div class="subject-card">
            <div class="subject-info">
                <h3 class="subject-title">probabilite</h3>
                <span class="coef-badge">Coef: 3</span>
            </div>
            <div class="inputs-container">
                <input type="number" id="prbintero" placeholder="Interro (40%)" min="0" max="20" step="0.25">
                <input type="number" id="probexam" placeholder="Exam (60%)" min="0" max="20" step="0.25">
            </div>
        </div>

        <div class="subject-card">
            <div class="subject-info">
                <h3 class="subject-title">dessin technique</h3>
                <span class="coef-badge">Coef: 1</span>
            </div>
            <div class="inputs-container">
                <input type="number" id="desintero" placeholder="Interro (40%)" min="0" max="20" step="0.25">
                <input type="number" id="desexam" placeholder="Exam (60%)" min="0" max="20" step="0.25">
            </div>
        </div>

        <div class="subject-card">
            <div class="subject-info">
                <h3 class="subject-title">economic</h3>
                <span class="coef-badge">Coef: 1</span>
            </div>
            <div class="inputs-container">
                <input type="number" id="ecointero" placeholder="Interro (40%)" min="0" max="20" step="0.25">
                <input type="number" id="ecoexam" placeholder="Exam (60%)" min="0" max="20" step="0.25">
            </div>
        </div>

        <div class="subject-card">
            <div class="subject-info">
                <h3 class="subject-title">human engineering</h3>
                <span class="coef-badge">Coef: 1</span>
            </div>
            <div class="inputs-container">
                <input type="number" id="humanaintero" placeholder="Interro (40%)" min="0" max="20" step="0.25">
                <input type="number" id="humexam" placeholder="Exam (60%)" min="0" max="20" step="0.25">
            </div>
        </div>

        <div class="subject-card">
            <div class="subject-info">
                <h3 class="subject-title">french</h3>
                <span class="coef-badge">Coef: 1</span>
            </div>
            <div class="inputs-container">
                <input type="number" id="frenintero" placeholder="Interro (40%)" min="0" max="20" step="0.25">
                <input type="number" id="frenexam" placeholder="Exam (60%)" min="0" max="20" step="0.25">
            </div>
        </div>

        <div class="subject-card">
            <div class="subject-info">
                <h3 class="subject-title">english</h3>
                <span class="coef-badge">Coef: 1</span>
            </div>
            <div class="inputs-container">
                <input type="number" id="engintero" placeholder="Interro (40%)" min="0" max="20" step="0.25">
                <input type="number" id="engexam" placeholder="Exam (60%)" min="0" max="20" step="0.25">
            </div>
        </div>
    </div>

    <div id="result-container">
        <button type="button" onclick="event.preventDefault(); calcul();">Calculate</button>
        <input type="text" id="result" readonly placeholder="المعدل العام">
    </div>

    <script>
        function getNum(id) {
            let val = document.getElementById(id).value;
            return val === "" ? 0 : Number(val);
        }

        function calcul() {
            let ana  = (getNum('anaintero') * 0.4) + (getNum('anaexam') * 0.6);
            let alg  = (getNum('algintero') * 0.4) + (getNum('algexam') * 0.6);
            let prob = (getNum('prbintero') * 0.4) + (getNum('probexam') * 0.6);
            let des  = (getNum('desintero') * 0.4) + (getNum('desexam') * 0.6);
            let eco  = (getNum('ecointero') * 0.4) + (getNum('ecoexam') * 0.6);
            let hum  = (getNum('humanaintero') * 0.4) + (getNum('humexam') * 0.6);
            let fren = (getNum('frenintero') * 0.4) + (getNum('frenexam') * 0.6);
            let eng  = (getNum('engintero') * 0.4) + (getNum('engexam') * 0.6);

            // تم تصحيح النسب هنا لتصبح متوافقة مع مجموع 100% (0.2 + 0.2 + 0.6 = 1)
            let phys = (getNum('physintero') * 0.2) + (getNum('phystp') * 0.2) + (getNum('physexam') * 0.6);
            let chim = (getNum('chimintero') * 0.2) + (getNum('chimtp') * 0.2) + (getNum('chimexam') * 0.6);
            let inf  = (getNum('infintero') * 0.2) + (getNum('inftp') * 0.2) + (getNum('infexam') * 0.6);

            // الحساب النهائي بالمعاملات (مجموع المعاملات = 30)
            let totalAverage = (ana*5 + phys*5 + chim*5 + alg*4 + inf*3 + prob*3 + des + eco + hum + fren + eng) / 30;

            document.getElementById('result').value = totalAverage.toFixed(2);
        }
    </script>

</body>
</html>
